---
- name: Update Proxmox hosts safely
  hosts: proxmox_hosts
  serial: 1
  become: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Upgrade packages
      ansible.builtin.apt:
        upgrade: dist
        autoremove: true
        autoclean: true

    - name: Check reboot requirement
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Report reboot status
      ansible.builtin.debug:
        msg: "reboot_required={{ reboot_required.stat.exists }}"
